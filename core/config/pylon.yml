# General server config
server:
  name: core
  path: /
  proxy: true
  # host: "0.0.0.0"
  # port: 8080

# Local paths to modules and config
development:
  modules: /data/modules
  config: /data/config

# Session storage
sessions:
  redis:
    host: redis
    password: ${REDIS_PASSWORD}
  prefix: pylon_session_

# Traefik config
traefik:
  redis:
    host: redis
    password: ${REDIS_PASSWORD}
  rootkey: traefik
  entrypoint: http
  rule: PathPrefix(`/`)
  node_hostname: pylon
  # node_url: http://pylon:8080

# Events
events:
  rabbitmq:
    host: rabbitmq
    port: 5672
    user: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASSWORD}
    vhost: carrier
    queue: events
    hmac_key: key
    hmac_digest: sha512
    callback_workers: 1

# RPC
rpc:
  rabbitmq:
    host: rabbitmq
    port: 5672
    user: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASSWORD}
    vhost: carrier
    queue: rpc
    hmac_key: key
    hmac_digest: sha512
    callback_workers: 4
  id_prefix: "core_"

# Module/config storage
storage:
  endpoint: minio:9000
  access_key: ${MINIO_ACCESS_KEY}
  secret_key: ${MINIO_SECRET_KEY}
  secure: false
  buckets:
    module: module
    config: config

# Settings for Flask application
# application:
#   EXPLAIN_TEMPLATE_LOADING: true
